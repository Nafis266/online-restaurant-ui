<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zaika — Menu</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { padding-top: 72px; }

    .menu-hero {
      background: var(--charcoal);
      padding: 5rem 3rem 4rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .menu-hero::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 100%, rgba(200,96,26,0.18) 0%, transparent 70%);
    }
    .menu-hero h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 300;
      color: var(--cream);
      position: relative;
      margin-bottom: 0.8rem;
    }
    .menu-hero p {
      font-size: 0.78rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--saffron-light);
      position: relative;
    }

    .menu-body {
      max-width: 1100px;
      margin: 0 auto;
      padding: 3rem 2rem;
    }
    .menu-section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--text-muted);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      padding-bottom: 0.8rem;
      border-bottom: 1px solid var(--border);
    }
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
      margin-bottom: 3rem;
    }
    .menu-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
    }
    .menu-card:hover {
      border-color: var(--saffron);
      box-shadow: var(--shadow-sm);
      transform: translateY(-3px);
    }
    .menu-card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .menu-card h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--charcoal);
      line-height: 1.3;
      flex: 1;
      margin-right: 1rem;
    }
    .menu-card-tag {
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 20px;
      white-space: nowrap;
    }
    .tag-veg  { background: #EAF3DE; color: #3B6D11; }
    .tag-non  { background: #FAECE7; color: #993C1D; }
    .menu-card-desc {
      font-size: 0.82rem;
      color: var(--text-muted);
      line-height: 1.6;
      flex: 1;
    }
    .menu-card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
    }
    .menu-price {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--saffron);
    }
    .menu-price span { font-size: 0.85rem; font-weight: 400; color: var(--text-muted); }
    .add-btn {
      background: transparent;
      border: 1.5px solid var(--saffron);
      color: var(--saffron);
      padding: 0.45rem 1.1rem;
      border-radius: 30px;
      font-family: 'Jost', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: all 0.2s;
    }
    .add-btn:hover       { background: var(--saffron); color: white; }
    .add-btn.added       { background: var(--saffron); color: white; }

    @media (max-width: 768px) {
      .menu-body { padding: 2rem 1rem; }
      .menu-hero  { padding: 3rem 1.5rem 2.5rem; }
      .menu-grid  { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="menu-hero">
    <h1>Our Menu</h1>
    <p>Hand-crafted with heritage recipes</p>
  </div>

  <div class="menu-body">
    <div class="menu-section-title">Chef's Selections</div>
    <div class="menu-grid" id="menu-grid"></div>
  </div>

  <footer>© 2025 <strong>Zaika</strong> — Authentic Indian Cuisine</footer>

  <script src="nav.js"></script>
  <script src="script.js"></script>
  <script src="menu.js"></script>
</body>
</html>
