<!DOCTYPE html>
<html>
<head>
  <title>Restaurant - Order Online</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Restaurant</h1>
  <nav>
    <a href="index.html">Menu</a>
    <a href="reservation.html">Reservation</a>
    <a href="feedback.html">Feedback</a>
  </nav>
</header>

<h2>Our Menu</h2>

<div class="menu-grid">

  <div class="menu-item">
    <h3>Thalassery Biriyani</h3>
    <p>₹180</p>
    <button onclick="addToCart('Chicken Biryani', 180)">Add</button>
  </div>

  <div class="menu-item">
    <h3>Paneer Tikka Masala</h3>
    <p>150</p>
    <button onclick="addToCart('Paneer Tikka Masala', 150)">Add</button>
  </div>

  <div class="menu-item">
    <h3>Masala Dosa</h3>
    <p>80</p>
    <button onclick="addToCart('Masala Dosa', 80)">Add</button>
  </div>

  <div class="menu-item">
    <h3>Mutton Rogan Josh</h3>
    <p>200</p>
    <button onclick="addToCart('Mutton Rogan Josh', 200)">Add</button>
  </div>

  <div class="menu-item">
    <h3>Chicken Shawarma</h3>
    <p>160</p>
    <button onclick="addToCart('Chicken Shawarma',160)">Add</button>
  </div>

</div>

<section class="cart">
  <h2>Your Order</h2>
  <ul id="cartList"></ul>
  <h3>Total: ₹<span id="total">0</span></h3>
  <button onclick="placeOrder()">Place Order</button>
</section>

<script src="script.js"></script>
</body>
</html>
